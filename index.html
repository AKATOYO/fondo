<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSI Forensic Lab Pro - Análisis de Imágenes</title>
    <meta name="description" content="Suite de análisis forense de imágenes con OpenCV, TensorFlow y OCR.">

    <script async src="https://docs.opencv.org/4.8.0/opencv.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.15.0/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.3/dist/coco-ssd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/exif-js@2.3.0/exif.js"></script>

    <style>
        :root { 
            --neon: #00ff99; 
            --bg: #0b0b0b; 
            --panel: #181818; 
            --border: #333;
            --header-bg: #111;
        }
        * { box-sizing: border-box; }
        body { 
            margin: 0; 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            background: var(--bg); 
            color: white; 
            height: 100vh; 
            display: flex;
            flex-direction: column;
            overflow: hidden; 
        }
        
        header { 
            padding: 10px 20px; 
            background: var(--header-bg); 
            border-bottom: 1px solid var(--border); 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            flex-wrap: wrap;
            z-index: 10;
            height: 60px;
            flex-shrink: 0;
        }
        h1 { margin: 0; color: var(--neon); font-size: 1.1rem; letter-spacing: 1px; display: flex; align-items: center; }
        .header-actions { display: flex; gap: 10px; align-items: center; }
        
        .custom-file-upload {
            border: 1px solid var(--neon); color: var(--neon);
            padding: 8px 15px; border-radius: 6px; cursor: pointer;
            font-weight: bold; font-size: 0.8rem; transition: 0.2s;
        }
        .custom-file-upload:hover { background: var(--neon); color: black; }
        input[type=file] { display: none; }

        button { 
            border: none; border-radius: 6px; cursor: pointer; 
            font-weight: bold; transition: 0.2s; font-size: 0.8rem; 
            padding: 8px 15px;
        }
        .btn-danger { background: #cc3300; color: white; }
        .btn-danger:hover { background: #aa2200; }
        .btn-primary { background: var(--neon); color: black; }
        .btn-primary:hover { background: #00cc77; }

        .toolbar {
            background: var(--header-bg);
            border-bottom: 2px solid var(--border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }
        .tab-nav {
            display: flex;
            padding: 0 20px;
            border-bottom: 1px solid #222;
            overflow-x: auto;
        }
        .tab-btn {
            background: transparent; color: #888; padding: 12px 20px;
            border-bottom: 2px solid transparent; margin-bottom: -1px;
        }
        .tab-btn:hover { color: white; }
        .tab-btn.active { color: var(--neon); border-bottom-color: var(--neon); }

        .tab-content {
            display: none;
            padding: 15px 20px;
            flex-wrap: wrap;
            align-items: center;
            gap: 20px;
            background: #0d0d0d;
        }
        .tab-content.active { display: flex; }

        .tool-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
            min-width: 120px;
        }
        .tool-group label { font-size: 0.7rem; color: #aaa; margin: 0; }
        .tool-group input[type=range] { width: 100%; accent-color: var(--neon); margin: 0; }
        .tool-group select {
            background: #2a2a2a; color: white; border: 1px solid #444;
            padding: 6px 8px; border-radius: 4px; font-size: 0.75rem;
        }
        
        .btn-tool {
            background: #2a2a2a; color: white; padding: 8px 12px; font-size: 0.75rem;
        }
        .btn-tool:hover { background: #444; }
        .btn-tool.btn-warning { background: #ff9900; color: black; }
        .btn-tool.btn-warning:hover { background: #e68a00; }
        .btn-tool.btn-active { background: var(--neon); color: black; }

        .viewer { 
            position: relative; 
            background: #050505; 
            flex-grow: 1; 
            min-height: 0; 
            display: flex; 
            overflow: auto; 
            background-image: linear-gradient(45deg, #0a0a0a 25%, transparent 25%), linear-gradient(-45deg, #0a0a0a 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #0a0a0a 75%), linear-gradient(-45deg, transparent 75%, #0a0a0a 75%); 
            background-size: 20px 20px; 
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px; 
            padding: 15px;
        }
        
        #canvas-wrapper { 
            position: relative; 
            display: none; 
            margin: auto; 
            box-shadow: 0 0 50px rgba(0,0,0,0.5); 
            max-width: 100%; 
            max-height: 100%;
        }
        canvas { 
            display: block; 
            border-radius: 4px;
            max-width: 100%; 
            max-height: calc(100vh - 140px); 
        }
        #detections { position: absolute; top: 0; left: 0; pointer-events: none; width: 100%; height: 100%; }
        #brush-canvas { position: absolute; top: 0; left: 0; pointer-events: none; z-index: 90; width: 100%; height: 100%; }
        #loupe { position: absolute; border: 3px solid var(--neon); border-radius: 50%; pointer-events: none; display: none; z-index: 100; box-shadow: 0 0 20px rgba(0,255,153,0.5); background: black; }
        
        .empty-state { color: #555; text-align: center; font-size: 1.2rem; background: rgba(0,0,0,0.5); padding: 40px; border-radius: 10px; margin: auto; }
        .empty-state span { font-size: 3rem; display: block; margin-bottom: 10px; }

        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); }
        .modal-content { background: var(--panel); margin: 8% auto; padding: 20px; border: 1px solid var(--neon); border-radius: 10px; width: 80%; max-width: 600px; }
        .close-btn { color: var(--neon); float: right; font-size: 24px; cursor: pointer; }
        .modal-text { color: white; white-space: pre-wrap; font-family: monospace; background: #000; padding: 15px; border-radius: 5px; max-height: 400px; overflow-y: auto; font-size: 12px;}

        .brush-cursor {
            position: fixed;
            border: 2px solid rgba(255, 50, 50, 0.9);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            display: none;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 6px rgba(255, 0, 0, 0.4);
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #222;
            color: var(--neon);
            padding: 12px 24px;
            border-radius: 8px;
            border: 1px solid var(--neon);
            font-size: 0.85rem;
            z-index: 10000;
            opacity: 0;
            transition: all 0.4s ease;
            pointer-events: none;
            font-family: monospace;
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        ::-webkit-scrollbar { width: 10px; height: 10px; }
        ::-webkit-scrollbar-track { background: #111; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 5px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--neon); }
    </style>
</head>
<body>

<div class="brush-cursor" id="brush-cursor"></div>
<div class="toast" id="toast"></div>

<header>
    <h1>🔬 CSI FORENSIC LAB PRO</h1>
    <div class="header-actions">
        <div id="status" style="font-size: 12px; font-family: monospace; color: var(--neon); margin-right: 10px;">⏳ Cargando...</div>
        <label for="upload" class="custom-file-upload">📁 Cargar Imagen</label>
        <input type="file" id="upload" accept="image/*">
        <button id="btn-clear" class="btn-danger">🗑️ Quitar</button>
        <button id="download" class="btn-primary">💾 Guardar</button>
    </div>
</header>

<nav class="toolbar">
    <div class="tab-nav">
        <button class="tab-btn active" data-tab="adjust">🎨 Ajustes</button>
        <button class="tab-btn" data-tab="forensic">🔍 Filtros Forenses</button>
        <button class="tab-btn" data-tab="inpaint">✨ Borrador Mágico</button>
        <button class="tab-btn" data-tab="ai">🧠 Inteligencia & OCR</button>
        <button class="tab-btn" data-tab="view">🔬 Visor & Lupa</button>
    </div>

    <div class="tab-content active" id="tab-adjust">
        <div class="tool-group"><label>Brillo</label><input type="range" id="brightness" min="-100" max="100" value="0"></div>
        <div class="tool-group"><label>Contraste</label><input type="range" id="contrast" min="-100" max="100" value="0"></div>
        <div class="tool-group"><label>Saturación</label><input type="range" id="saturate" min="-100" max="100" value="0"></div>
        <div class="tool-group"><label>Grises</label><input type="range" id="grayscale" min="0" max="100" value="0"></div>
        <div class="tool-group"><label>Tono</label><input type="range" id="hueRotate" min="0" max="360" value="0"></div>
        <div class="tool-group"><label>Nitidez</label><input type="range" id="sharpness" min="0" max="100" value="0"></div>
        <button id="reset" class="btn-tool">Restablecer</button>
    </div>

    <div class="tab-content" id="tab-forensic">
        <button id="btn-thermal" class="btn-tool">🔥 Visión Térmica</button>
        <button id="btn-night" class="btn-tool">🌙 Visión Nocturna</button>
        <button id="btn-canny" class="btn-tool">📐 Canny Edge (OpenCV)</button>
        <button id="btn-remove-bg" class="btn-tool btn-warning">✂️ Quitar Fondo (GrabCut)</button>
    </div>

    <div class="tab-content" id="tab-inpaint">
        <p style="font-size: 0.8rem; color: #aaa; margin: 0; max-width: 320px;">Pinta sobre el objeto a eliminar y aplica el borrado mágico. El algoritmo rellena con la textura del entorno.</p>
        <button id="btn-toggle-brush" class="btn-tool btn-warning">✏️ Activar Pincel</button>
        <div class="tool-group"><label>Tamaño del Pincel</label><input type="range" id="brushSize" min="5" max="150" value="30"></div>
        <div class="tool-group">
            <label>Método de Inpaint</label>
            <select id="inpaintMethod">
                <option value="telea" selected>Telea (Rápido)</option>
                <option value="ns">Navier-Stokes (Preciso)</option>
            </select>
        </div>
        <button id="btn-apply-inpaint" class="btn-tool btn-primary">✨ Aplicar Borrado</button>
        <button id="btn-clear-brush" class="btn-tool">🧹 Limpiar Pincel</button>
    </div>

    <div class="tab-content" id="tab-ai">
        <button id="btn-detect" class="btn-tool">🤖 Detección Objetos (IA)</button>
        <button id="btn-ocr" class="btn-tool">📝 Extraer Texto (OCR)</button>
        <button id="btn-meta" class="btn-tool">📂 Ver Metadata EXIF</button>
    </div>

    <div class="tab-content" id="tab-view">
        <button id="toggleLoupe" class="btn-tool btn-active">Lupa: ON/OFF</button>
        <div class="tool-group"><label>Zoom Lupa</label><input type="range" id="lZoom" min="2" max="20" value="8"></div>
        <div class="tool-group"><label>Tamaño Lupa</label><input type="range" id="lSize" min="200" max="600" value="300"></div>
        <div class="tool-group">
            <label>Histograma (Luminosidad)</label>
            <canvas id="histogram" width="200" height="60" style="background: black; border-radius: 4px;"></canvas>
        </div>
    </div>
</nav>

<main class="viewer" id="viewer-area">
    <div class="empty-state" id="empty-state">
        <span>📁</span>
        Selecciona una imagen para comenzar el análisis
    </div>
    <div id="canvas-wrapper">
        <canvas id="canvas"></canvas>
        <canvas id="brush-canvas"></canvas>
        <canvas id="detections"></canvas>
        <canvas id="loupe"></canvas>
    </div>
</main>

<div id="ocr-modal" class="modal">
    <div class="modal-content">
        <span class="close-btn" id="close-ocr-modal">×</span>
        <h2>📝 Texto Extraído (OCR)</h2>
        <div id="ocr-result" class="modal-text">Procesando...</div>
    </div>
</div>

<div id="meta-modal" class="modal">
    <div class="modal-content">
        <span class="close-btn" id="close-meta-modal">×</span>
        <h2>📂 Metadata EXIF</h2>
        <pre id="meta" class="modal-text">Sin metadata...</pre>
    </div>
</div>

<script>
(function() {
    let model = null;
    let originalImage = null;
    let tempImageData = null;
    let cvReady = false;
    let loupeEnabled = true;

    let brushActive = false;
    let isDrawing = false;

    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d", { willReadFrequently: true });
    const dCanvas = document.getElementById("detections");
    const dctx = dCanvas.getContext("2d");
    const loupe = document.getElementById("loupe");
    const lctx = loupe.getContext("2d", { willReadFrequently: true });
    const statusText = document.getElementById("status");
    const emptyState = document.getElementById("empty-state");
    const canvasWrapper = document.getElementById("canvas-wrapper");
    
    const ocrModal = document.getElementById("ocr-modal");
    const ocrResult = document.getElementById("ocr-result");
    const metaModal = document.getElementById("meta-modal");
    const metaPre = document.getElementById("meta");

    const brushCanvas = document.getElementById("brush-canvas");
    const bctx = brushCanvas.getContext("2d");

    const maskCanvas = document.createElement("canvas");
    maskCanvas.style.display = "none";
    maskCanvas.style.position = "absolute";
    maskCanvas.style.left = "-9999px";
    document.body.appendChild(maskCanvas);
    const mctx = maskCanvas.getContext("2d", { willReadFrequently: true });

    const brushCursorEl = document.getElementById("brush-cursor");
    const toastEl = document.getElementById("toast");

    const controlIds = ["brightness", "contrast", "saturate", "grayscale", "hueRotate", "sharpness"];
    const inputs = {};
    controlIds.forEach(id => {
        inputs[id] = document.getElementById(id);
        inputs[id].addEventListener('input', applyFilters); // Event listener for adjust tabs
    });

    // Reset controls
    document.getElementById("reset").addEventListener('click', () => {
        controlIds.forEach(id => inputs[id].value = inputs[id].defaultValue);
        applyFilters();
    });

    let toastTimer = null;
    function showToast(msg, duration = 3000) {
        toastEl.textContent = msg;
        toastEl.classList.add("show");
        if (toastTimer) clearTimeout(toastTimer);
        toastTimer = setTimeout(() => toastEl.classList.remove("show"), duration);
    }

    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
        });
    });

    document.getElementById("close-ocr-modal").addEventListener("click", () => ocrModal.style.display = "none");
    document.getElementById("close-meta-modal").addEventListener("click", () => metaModal.style.display = "none");

    function updateSystemStatus() {
        if (cvReady && model) statusText.textContent = "✅ IA y OpenCV Online";
        else if (cvReady) statusText.textContent = "✅ OpenCV Listo | ⏳ Cargando IA...";
        else if (model) statusText.textContent = "✅ IA Lista | ⏳ Cargando OpenCV...";
    }

    function onOpenCvReady() {
        cvReady = true;
        updateSystemStatus();
    }

    async function initAI() {
        try {
            model = await cocoSsd.load();
            updateSystemStatus();
        } catch (e) { 
            statusText.textContent = "❌ Error al cargar IA"; 
        }
    }

    if (typeof cv !== 'undefined') {
        if (cv instanceof Promise) cv.then(onOpenCvReady);
        else cv['onRuntimeInitialized'] = onOpenCvReady;
    } else {
        window.Module = { onRuntimeInitialized: onOpenCvReady };
    }
    initAI();

    document.getElementById("upload").addEventListener("change", (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const img = new Image();
        img.onload = () => {
            const MAX_SIZE = 2500; 
            let width = img.width;
            let height = img.height;

            if (width > MAX_SIZE || height > MAX_SIZE) {
                if (width > height) {
                    height = Math.round((height * MAX_SIZE) / width);
                    width = MAX_SIZE;
                } else {
                    width = Math.round((width * MAX_SIZE) / height);
                    height = MAX_SIZE;
                }
            }

            originalImage = img;
            canvas.width = dCanvas.width = brushCanvas.width = maskCanvas.width = width;
            canvas.height = dCanvas.height = brushCanvas.height = maskCanvas.height = height;
            emptyState.style.display = 'none';
            canvasWrapper.style.display = 'inline-block';
            
            controlIds.forEach(id => inputs[id].value = inputs[id].defaultValue);
            applyFilters();
            
            document.getElementById('viewer-area').scrollTo(0, 0);
            showToast("Imagen cargada: " + width + "x" + height);
        };
        img.src = URL.createObjectURL(file);
    });

    document.getElementById("btn-clear").addEventListener("click", () => {
        originalImage = null;
        tempImageData = null;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        bctx.clearRect(0, 0, brushCanvas.width, brushCanvas.height);
        mctx.clearRect(0, 0, maskCanvas.width, maskCanvas.height);
        dctx.clearRect(0, 0, dCanvas.width, dCanvas.height);
        document.getElementById("upload").value = "";
        canvasWrapper.style.display = 'none';
        emptyState.style.display = 'block';
        controlIds.forEach(id => inputs[id].value = inputs[id].defaultValue);
        const hCanvas = document.getElementById("histogram");
        hCanvas.getContext("2d").clearRect(0, 0, hCanvas.width, hCanvas.height);
        statusText.textContent = "🗑️ Imagen borrada. Listo.";
        if (brushActive) document.getElementById("btn-toggle-brush").click();
    });

    function applyFilters() {
        if (!originalImage) return;
        ctx.filter = `
            brightness(${100 + parseInt(inputs.brightness.value)}%)
            contrast(${100 + parseInt(inputs.contrast.value)}%)
            saturate(${100 + parseInt(inputs.saturate.value)}%)
            grayscale(${inputs.grayscale.value}%)
            hue-rotate(${inputs.hueRotate.value}deg)
        `;
        ctx.drawImage(originalImage, 0, 0, canvas.width, canvas.height);
        ctx.filter = "none";

        let imageData = ctx.getImageData(0,0, canvas.width, canvas.height);
        if (parseInt(inputs.sharpness.value) > 0) {
            sharpen(imageData, parseInt(inputs.sharpness.value));
            ctx.putImageData(imageData, 0, 0);
        }

        tempImageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        drawHistogram();
        dctx.clearRect(0, 0, dCanvas.width, dCanvas.height);
    }

    function sharpen(imageData, amount) {
        const d = imageData.data;
        const factor = amount / 20;
        for (let i = 0; i < d.length; i += 4) {
            d[i] = d[i] + factor * (d[i] - 128);
            d[i+1] = d[i+1] + factor * (d[i+1] - 128);
            d[i+2] = d[i+2] + factor * (d[i+2] - 128);
        }
    }

    function drawHistogram() {
        if (!tempImageData) return;
        const hCanvas = document.getElementById("histogram");
        const hCtx = hCanvas.getContext("2d");
        hCtx.clearRect(0, 0, hCanvas.width, hCanvas.height);
        
        let hist = new Array(256).fill(0);
        let d = tempImageData.data;
        for(let i = 0; i < d.length; i += 4) {
            // Luminosity method
            let lum = Math.round(d[i]*0.299 + d[i+1]*0.587 + d[i+2]*0.114);
            hist[lum]++;
        }
        
        let max = Math.max(...hist);
        hCtx.fillStyle = "var(--neon)";
        for(let i = 0; i < 256; i++) {
            let h = (hist[i] / max) * hCanvas.height;
            hCtx.fillRect(i * (hCanvas.width / 256), hCanvas.height - h, hCanvas.width / 256, h);
        }
    }

    document.getElementById("btn-thermal").addEventListener("click", () => {
        if (!tempImageData) return;
        let d = new Uint8ClampedArray(tempImageData.data);
        for (let i = 0; i < d.length; i += 4) {
            let avg = (d[i] + d[i+1] + d[i+2]) / 3;
            d[i] = avg > 128 ? 255 : avg * 2;
            d[i+1] = avg;
            d[i+2] = 255 - avg;
        }
        ctx.putImageData(new ImageData(d, canvas.width, canvas.height), 0, 0);
        tempImageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        drawHistogram();
    });

    document.getElementById("btn-night").addEventListener("click", () => {
        if (!tempImageData) return;
        let d = new Uint8ClampedArray(tempImageData.data);
        for (let i = 0; i < d.length; i += 4) {
            let g = d[i] * 0.3 + d[i+1] * 0.59 + d[i+2] * 0.11;
            d[i] = 0; d[i+1] = g * 1.5; d[i+2] = 0;
        }
        ctx.putImageData(new ImageData(d, canvas.width, canvas.height), 0, 0);
        tempImageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        drawHistogram();
    });

    document.getElementById("btn-canny").addEventListener("click", () => {
        if (!cvReady) return showToast("OpenCV cargando...");
        if (!originalImage) return;
        try {
            let src = cv.imread(canvas);
            let dst = new cv.Mat();
            cv.cvtColor(src, src, cv.COLOR_RGBA2GRAY);
            cv.Canny(src, dst, 50, 150);
            cv.imshow(canvas, dst);
            src.delete(); dst.delete();
            tempImageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            drawHistogram();
        } catch (e) { console.error(e); }
    });

    document.getElementById("btn-remove-bg").addEventListener("click", () => {
        if (!cvReady) return showToast("OpenCV cargando...");
        if (!originalImage) return;
        
        statusText.textContent = "⏳ Analizando imagen (GrabCut)...";
        
        setTimeout(() => {
            try {
                let src = cv.imread(canvas);
                let originalSize = new cv.Size(src.cols, src.rows);
                
                let scale = Math.min(1, 600 / Math.max(src.cols, src.rows));
                let smallSize = new cv.Size(Math.round(src.cols * scale), Math.round(src.rows * scale));
                let smallSrc = new cv.Mat();
                cv.resize(src, smallSrc, smallSize, 0, 0, cv.INTER_AREA);
                
                let smallSrcRGB = new cv.Mat();
                cv.cvtColor(smallSrc, smallSrcRGB, cv.COLOR_RGBA2RGB, 0);

                let mask = new cv.Mat(smallSrc.rows, smallSrc.cols, cv.CV_8UC1);
                let bgdModel = new cv.Mat(1, 65, cv.CV_64FC1, new cv.Scalar(0));
                let fgdModel = new cv.Mat(1, 65, cv.CV_64FC1, new cv.Scalar(0));
                
                let marginX = Math.max(1, Math.floor(smallSrc.cols * 0.02));
                let marginY = Math.max(1, Math.floor(smallSrc.rows * 0.02));
                let rect = new cv.Rect(marginX, marginY, smallSrc.cols - 2 * marginX, smallSrc.rows - 2 * marginY);
                
                cv.grabCut(smallSrcRGB, mask, rect, bgdModel, fgdModel, 10, cv.GC_INIT_WITH_RECT);
                
                let smallBinMask = new cv.Mat(smallSrc.rows, smallSrc.cols, cv.CV_8UC1);
                let smallMaskData = mask.data;
                let smallBinData = smallBinMask.data;
                let sSize = mask.rows * mask.cols;
                for (let i = 0; i < sSize; i++) {
                    smallBinData[i] = (smallMaskData[i] === 1 || smallMaskData[i] === 3) ? 255 : 0;
                }

                cv.GaussianBlur(smallBinMask, smallBinMask, new cv.Size(3, 3), 0);
                
                let fullBinMask = new cv.Mat();
                cv.resize(smallBinMask, fullBinMask, originalSize, 0, 0, cv.INTER_NEAREST);
                
                let rgbaPlanes = new cv.MatVector();
                cv.split(src, rgbaPlanes);
                rgbaPlanes.set(3, fullBinMask);
                
                let finalDst = new cv.Mat();
                cv.merge(rgbaPlanes, finalDst);

                cv.imshow(canvas, finalDst);
                
                tempImageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                drawHistogram();
                statusText.textContent = "✅ Fondo removido con alta precisión";
                
                src.delete(); smallSrc.delete(); smallSrcRGB.delete(); mask.delete(); 
                bgdModel.delete(); fgdModel.delete(); smallBinMask.delete(); 
                fullBinMask.delete(); rgbaPlanes.delete(); finalDst.delete();
                
            } catch (e) {
                console.error("Error en GrabCut:", e);
                statusText.textContent = "❌ Error removiendo fondo: " + e.message;
            }
        }, 100);
    });

    document.getElementById("btn-toggle-brush").addEventListener("click", (e) => {
        brushActive = !brushActive;
        if (brushActive) {
            e.target.classList.add("btn-active");
            e.target.textContent = "🚫 Desactivar Pincel";
            canvas.style.cursor = "none";
            brushCursorEl.style.display = "block";
            if (loupeEnabled) document.getElementById("toggleLoupe").click();
            showToast("Pincel activado — pinta sobre lo que quieras eliminar");
        } else {
            e.target.classList.remove("btn-active");
            e.target.textContent = "✏️ Activar Pincel";
            canvas.style.cursor = "default";
            brushCursorEl.style.display = "none";
        }
    });

    document.getElementById("btn-clear-brush").addEventListener("click", () => {
        bctx.clearRect(0, 0, brushCanvas.width, brushCanvas.height);
        mctx.clearRect(0, 0, maskCanvas.width, maskCanvas.height);
        showToast("Pincel limpiado");
    });

    function getMousePos(evt) {
        const rect = canvas.getBoundingClientRect();
        return {
            x: (evt.clientX - rect.left) * (canvas.width / rect.width),
            y: (evt.clientY - rect.top) * (canvas.height / rect.height)
        };
    }

    canvas.addEventListener("mousedown", (e) => {
        if (!brushActive) return;
        isDrawing = true;
        drawBrush(e);
    });
    
    canvas.addEventListener("mousemove", (e) => {
        if (brushActive) {
            const size = parseInt(document.getElementById("brushSize").value);
            const rect = canvas.getBoundingClientRect();
            const displaySize = size * (rect.width / canvas.width);
            brushCursorEl.style.width = displaySize + "px";
            brushCursorEl.style.height = displaySize + "px";
            brushCursorEl.style.left = e.clientX + "px";
            brushCursorEl.style.top = e.clientY + "px";
        }
        if (!brushActive || !isDrawing) return;
        drawBrush(e);
    });
    
    canvas.addEventListener("mouseup", () => isDrawing = false);
    canvas.addEventListener("mouseleave", () => {
        isDrawing = false;
        if (brushActive) brushCursorEl.style.display = "none";
    });
    
    canvas.addEventListener("mouseenter", () => {
        if (brushActive) brushCursorEl.style.display = "block";
    });

    canvas.addEventListener("touchstart", (e) => {
        if (!brushActive) return;
        e.preventDefault();
        isDrawing = true;
        drawBrushTouch(e);
    }, { passive: false });
    
    canvas.addEventListener("touchmove", (e) => {
        if (!brushActive || !isDrawing) return;
        e.preventDefault();
        drawBrushTouch(e);
    }, { passive: false });
    
    canvas.addEventListener("touchend", () => isDrawing = false);

    function getTouchPos(evt) {
        const touch = evt.touches[0];
        const rect = canvas.getBoundingClientRect();
        return {
            x: (touch.clientX - rect.left) * (canvas.width / rect.width),
            y: (touch.clientY - rect.top) * (canvas.height / rect.height)
        };
    }

    function drawBrushTouch(e) {
        const pos = getTouchPos(e);
        paintBrushStroke(pos.x, pos.y);
    }

    function drawBrush(e) {
        if (!isDrawing) return;
        const pos = getMousePos(e);
        paintBrushStroke(pos.x, pos.y);
    }

    function paintBrushStroke(x, y) {
        const size = parseInt(document.getElementById("brushSize").value);
        const halfSize = size / 2;

        bctx.fillStyle = "rgba(255, 40, 40, 0.45)";
        bctx.beginPath();
        bctx.arc(x, y, halfSize, 0, Math.PI * 2);
        bctx.fill();

        mctx.fillStyle = "white";
        mctx.beginPath();
        mctx.arc(x, y, halfSize, 0, Math.PI * 2);
        mctx.fill();
    }

    // ================================================================
    // INPAINT REPARADO
    // ================================================================
    document.getElementById("btn-apply-inpaint").addEventListener("click", () => {
        if (!cvReady) return showToast("❌ OpenCV aún cargando...", 3000);
        if (!originalImage) return showToast("❌ No hay imagen cargada", 3000);

        statusText.textContent = "⏳ Preparando máscara y borrando...";
        
        setTimeout(() => {
            try {
                const maskPixelData = mctx.getImageData(0, 0, maskCanvas.width, maskCanvas.height);
                const maskMat = new cv.Mat(maskCanvas.height, maskCanvas.width, cv.CV_8UC1);
                const maskPtr = maskMat.data;
                
                let hasPixels = false;
                for (let i = 0; i < maskPixelData.data.length; i += 4) {
                    let val = maskPixelData.data[i] > 0 ? 255 : 0;
                    maskPtr[i / 4] = val;
                    if (val > 0) hasPixels = true;
                }
                
                if (!hasPixels) {
                    maskMat.delete();
                    statusText.textContent = "✅ IA y OpenCV Online";
                    return showToast("❌ No has pintado nada para borrar", 3000);
                }

                let src = cv.imread(canvas);
                let dst = new cv.Mat();
                let method = document.getElementById("inpaintMethod").value === 'telea' ? cv.INPAINT_TELEA : cv.INPAINT_NS;
                
                // Radio basado en el pincel para mejor cobertura
                let radius = Math.max(3, parseInt(document.getElementById("brushSize").value) / 2);

                cv.inpaint(src, maskMat, dst, radius, method);
                cv.imshow(canvas, dst);
                
                // Limpiar todo después del inpaint
                tempImageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                bctx.clearRect(0, 0, brushCanvas.width, brushCanvas.height);
                mctx.clearRect(0, 0, maskCanvas.width, maskCanvas.height);
                drawHistogram();
                
                statusText.textContent = "✅ Borrado mágico aplicado";
                showToast("Objeto eliminado");
                
                src.delete(); dst.delete(); maskMat.delete();
            } catch (err) {
                console.error("Error de Inpaint:", err);
                statusText.textContent = "❌ Error en el borrado: " + err.message;
            }
        }, 50);
    });

    // ================================================================
    // IA - DETECCIÓN DE OBJETOS
    // ================================================================
    document.getElementById("btn-detect").addEventListener("click", async () => {
        if (!originalImage) return showToast("❌ No hay imagen cargada");
        if (!model) return showToast("❌ IA aún cargando...");
        
        statusText.textContent = "🤖 Analizando imagen con IA...";
        dctx.clearRect(0, 0, dCanvas.width, dCanvas.height);
        
        try {
            const predictions = await model.detect(canvas);
            
            dctx.font = "16px Arial";
            dctx.lineWidth = 2;
            
            if (predictions.length === 0) {
                statusText.textContent = "✅ Ningún objeto detectado";
                return showToast("No se detectaron objetos");
            }

            predictions.forEach(p => {
                dctx.strokeStyle = "var(--neon)";
                dctx.fillStyle = "var(--neon)";
                dctx.strokeRect(p.bbox[0], p.bbox[1], p.bbox[2], p.bbox[3]);
                dctx.fillText(`${p.class} (${Math.round(p.score * 100)}%)`, p.bbox[0], p.bbox[1] > 20 ? p.bbox[1] - 5 : 20);
            });
            
            statusText.textContent = `✅ ${predictions.length} objetos detectados`;
        } catch(err) {
            statusText.textContent = "❌ Error en la detección";
        }
    });

    // ================================================================
    // OCR - EXTRACCIÓN DE TEXTO
    // ================================================================
    document.getElementById("btn-ocr").addEventListener("click", () => {
        if (!originalImage) return showToast("❌ No hay imagen cargada");
        
        ocrModal.style.display = "block";
        ocrResult.textContent = "⏳ Analizando imagen con Tesseract OCR...\nEsto puede tomar unos segundos...";
        statusText.textContent = "📝 Extrayendo texto...";
        
        Tesseract.recognize(canvas, 'eng+spa', { logger: m => console.log(m) })
            .then(({ data: { text } }) => {
                ocrResult.textContent = text.trim() ? text : "No se encontró texto legible en la imagen.";
                statusText.textContent = "✅ Texto extraído correctamente";
            }).catch(err => {
                ocrResult.textContent = "❌ Error en OCR: " + err;
                statusText.textContent = "❌ Error extrayendo texto";
            });
    });

    // ================================================================
    // METADATA EXIF
    // ================================================================
    document.getElementById("btn-meta").addEventListener("click", () => {
        const fileInput = document.getElementById("upload");
        if (!fileInput.files || fileInput.files.length === 0) return showToast("❌ Carga una imagen directamente desde tu disco local");
        
        metaModal.style.display = "block";
        metaPre.textContent = "⏳ Leyendo datos EXIF...";
        
        EXIF.getData(fileInput.files[0], function() {
            const allMetaData = EXIF.getAllTags(this);
            if (Object.keys(allMetaData).length === 0) {
                metaPre.textContent = "No se encontraron metadatos EXIF en esta imagen.";
            } else {
                metaPre.textContent = JSON.stringify(allMetaData, null, 2);
            }
        });
    });

    // ================================================================
    // LUPA
    // ================================================================
    document.getElementById("toggleLoupe").addEventListener('click', (e) => {
        loupeEnabled = !loupeEnabled;
        if(loupeEnabled) {
            e.target.classList.add('btn-active');
            showToast("🔍 Lupa activada");
        } else {
            e.target.classList.remove('btn-active');
            loupe.style.display = 'none';
            showToast("🔍 Lupa desactivada");
        }
    });

    canvasWrapper.addEventListener('mousemove', (e) => {
        if (!loupeEnabled || brushActive || !originalImage) {
            loupe.style.display = 'none';
            return;
        }
        
        loupe.style.display = 'block';
        const pos = getMousePos(e);
        const zoom = parseInt(document.getElementById("lZoom").value);
        const size = parseInt(document.getElementById("lSize").value);
        
        loupe.style.width = size + 'px';
        loupe.style.height = size + 'px';
        loupe.width = size;
        loupe.height = size;
        
        // Evitar que la lupa se salga de la pantalla para el cursor
        const rect = canvasWrapper.getBoundingClientRect();
        loupe.style.left = (e.clientX - rect.left - size / 2) + 'px';
        loupe.style.top = (e.clientY - rect.top - size / 2) + 'px';

        lctx.clearRect(0, 0, size, size);
        lctx.imageSmoothingEnabled = false;
        
        const sw = size / zoom;
        const sh = size / zoom;
        const sx = pos.x - sw / 2;
        const sy = pos.y - sh / 2;
        
        lctx.drawImage(canvas, sx, sy, sw, sh, 0, 0, size, size);
    });
    
    canvasWrapper.addEventListener('mouseleave', () => loupe.style.display = 'none');

    // ================================================================
    // DESCARGAR IMAGEN
    // ================================================================
    document.getElementById("download").addEventListener('click', () => {
        if (!originalImage) return showToast("❌ No hay imagen para guardar");
        
        const link = document.createElement('a');
        link.download = 'CSI_Forensic_Export_' + Date.now() + '.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
        showToast("💾 Imagen guardada");
    });

})();
</script>
</body>
</html>
