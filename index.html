<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>CSI Forensic Lab Pro - Análisis de Imágenes</title>
    <meta name="description" content="Suite de análisis forense de imágenes con OpenCV, TensorFlow y OCR.">

    <!-- Librerías Externas -->
    <script async src="https://docs.opencv.org/4.8.0/opencv.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.15.0/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.3/dist/coco-ssd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/exif-js@2.3.0/exif.js"></script>

    <style>
        :root { 
            --neon: #00ff99; 
            --bg: #0b0b0b; 
            --panel: #181818; 
            --border: #333;
            --header-bg: #111;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            background: var(--bg); 
            color: white; 
            height: 100vh; 
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden; 
        }
        
        /* ===== HEADER ===== */
        header { 
            padding: 10px 20px; 
            background: var(--header-bg); 
            border-bottom: 1px solid var(--border); 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            flex-wrap: wrap;
            z-index: 10;
            flex-shrink: 0;
            gap: 8px;
        }
        h1 { 
            color: var(--neon); 
            font-size: 1.1rem; 
            letter-spacing: 1px; 
            display: flex; 
            align-items: center;
            white-space: nowrap;
        }
        .header-actions { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        
        .custom-file-upload {
            border: 1px solid var(--neon); color: var(--neon);
            padding: 8px 15px; border-radius: 6px; cursor: pointer;
            font-weight: bold; font-size: 0.8rem; transition: 0.2s;
            display: inline-flex; align-items: center; gap: 4px;
            white-space: nowrap;
        }
        .custom-file-upload:hover { background: var(--neon); color: black; }
        input[type=file] { display: none; }

        button { 
            border: none; border-radius: 6px; cursor: pointer; 
            font-weight: bold; transition: 0.2s; font-size: 0.8rem; 
            padding: 8px 15px;
            white-space: nowrap;
            touch-action: manipulation;
        }
        .btn-danger { background: #cc3300; color: white; }
        .btn-danger:hover { background: #aa2200; }
        .btn-primary { background: var(--neon); color: black; }
        .btn-primary:hover { background: #00cc77; }

        /* ===== TOOLBAR / TABS ===== */
        .toolbar {
            background: var(--header-bg);
            border-bottom: 2px solid var(--border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }
        .tab-nav {
            display: flex;
            padding: 0 20px;
            border-bottom: 1px solid #222;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }
        .tab-nav::-webkit-scrollbar { display: none; }
        .tab-btn {
            background: transparent; color: #888; padding: 12px 20px;
            border-bottom: 2px solid transparent; margin-bottom: -1px;
            flex-shrink: 0;
        }
        .tab-btn:hover { color: white; }
        .tab-btn.active { color: var(--neon); border-bottom-color: var(--neon); }

        .tab-content {
            display: none;
            padding: 15px 20px;
            flex-wrap: wrap;
            align-items: center;
            gap: 20px;
            background: #0d0d0d;
        }
        .tab-content.active { display: flex; }

        .tool-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
            min-width: 120px;
        }
        .tool-group label { font-size: 0.7rem; color: #aaa; }
        .tool-group input[type=range] { width: 100%; accent-color: var(--neon); }
        
        .btn-tool {
            background: #2a2a2a; color: white; padding: 8px 12px; font-size: 0.75rem;
        }
        .btn-tool:hover { background: #444; }
        .btn-tool.btn-warning { background: #ff9900; color: black; }
        .btn-tool.btn-warning:hover { background: #e68a00; }
        .btn-tool.btn-active { background: var(--neon); color: black; }

        /* ===== VIEWER ===== */
        .viewer { 
            position: relative; 
            background: #050505; 
            flex-grow: 1; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            overflow: hidden; 
            background-image: linear-gradient(45deg, #0a0a0a 25%, transparent 25%), linear-gradient(-45deg, #0a0a0a 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #0a0a0a 75%), linear-gradient(-45deg, transparent 75%, #0a0a0a 75%); 
            background-size: 20px 20px; 
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px; 
            min-height: 0;
        }
        #canvas-wrapper { 
            position: relative; 
            display: none; 
            box-shadow: 0 0 50px rgba(0,0,0,0.5); 
            max-width: 100%; 
            max-height: 100%;
            line-height: 0;
            will-change: transform;
            transform-origin: 0 0;
        }
        canvas { max-width: 100%; max-height: 100%; border-radius: 4px; display: block; }
        #detections { position: absolute; top: 0; left: 0; pointer-events: none; }
        #brush-canvas { position: absolute; top: 0; left: 0; pointer-events: none; z-index: 90; }
        #loupe { position: absolute; border: 3px solid var(--neon); border-radius: 50%; pointer-events: none; display: none; z-index: 100; box-shadow: 0 0 20px rgba(0,255,153,0.5); background: black; }
        
        .empty-state { 
            color: #555; text-align: center; font-size: 1.2rem; 
            background: rgba(0,0,0,0.5); padding: 40px; border-radius: 10px;
            max-width: 90%;
        }
        .empty-state span { font-size: 3rem; display: block; margin-bottom: 10px; }

        /* ===== INDICADOR DE ZOOM ===== */
        .zoom-indicator {
            position: absolute;
            bottom: 12px;
            right: 12px;
            background: rgba(0,0,0,0.85);
            border: 1px solid #444;
            color: var(--neon);
            font-family: 'Courier New', monospace;
            font-size: 0.8rem;
            font-weight: bold;
            padding: 6px 12px;
            border-radius: 6px;
            z-index: 50;
            pointer-events: none;
            backdrop-filter: blur(4px);
            letter-spacing: 0.5px;
        }

        /* ===== MODALES ===== */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); overflow-y: auto; }
        .modal-content { background: var(--panel); margin: 8% auto; padding: 20px; border: 1px solid var(--neon); border-radius: 10px; width: 80%; max-width: 600px; }
        .close-btn { color: var(--neon); float: right; font-size: 24px; cursor: pointer; line-height: 1; }
        .close-btn:hover { color: white; }
        .modal-text { color: white; white-space: pre-wrap; font-family: monospace; background: #000; padding: 15px; border-radius: 5px; max-height: 400px; overflow-y: auto; font-size: 12px;}

        /* ===== SCROLLBAR ===== */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #111; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--neon); }

        /* ===== INSTRUCCIONES TÁCTILES ===== */
        .touch-hint {
            display: none;
            font-size: 0.7rem;
            color: #888;
            text-align: center;
            padding: 4px 10px;
            background: #0d0d0d;
            border-bottom: 1px solid #222;
            flex-shrink: 0;
        }

        /* ===================================================
           RESPONSIVE — TABLET (hasta 900px)
           =================================================== */
        @media (max-width: 900px) {
            header { padding: 8px 14px; }
            h1 { font-size: 0.95rem; }
            #status { font-size: 10px; }
            .tab-btn { padding: 10px 14px; font-size: 0.75rem; }
            .tool-group { min-width: 100px; }
        }

        /* ===================================================
           RESPONSIVE — MÓVIL (hasta 640px)
           =================================================== */
        @media (max-width: 640px) {
            body {
                height: auto;
                min-height: 100vh;
                min-height: 100dvh;
                overflow-y: auto;
            }

            header {
                flex-direction: column;
                align-items: stretch;
                gap: 8px;
                padding: 10px 12px;
            }
            h1 { 
                font-size: 0.85rem; 
                justify-content: center; 
            }
            #status { display: none; }
            .header-actions {
                justify-content: center;
                gap: 6px;
            }
            .custom-file-upload, 
            .header-actions button {
                font-size: 0.7rem;
                padding: 7px 10px;
            }

            .tab-nav { padding: 0 8px; }
            .tab-btn { 
                padding: 9px 10px; 
                font-size: 0.65rem; 
            }

            .tab-content { 
                padding: 10px 10px; 
                gap: 8px; 
            }
            .tool-group { 
                min-width: 0; 
                flex: 1 1 70px; 
            }
            .tool-group label { font-size: 0.6rem; }
            .tool-group input[type=range] { min-width: 50px; }
            .btn-tool { 
                font-size: 0.65rem; 
                padding: 7px 8px; 
            }
            .tab-content p { 
                font-size: 0.7rem !important; 
                width: 100%; 
            }

            .viewer { 
                min-height: 45vh;
                min-height: 45dvh;
            }

            .touch-hint { display: block; }

            #histogram {
                width: 100% !important;
                max-width: 200px;
                height: auto !important;
            }

            .modal-content { 
                width: 95%; 
                margin: 5% auto; 
                padding: 15px; 
            }
            .modal-text { 
                font-size: 11px; 
                max-height: 50vh; 
            }
            .modal-content h2 { font-size: 1rem; }

            #loupe { display: none !important; }
            .zoom-indicator { font-size: 0.7rem; padding: 4px 8px; bottom: 8px; right: 8px; }
        }

        /* ===================================================
           RESPONSIVE — MÓVIL PEQUEÑO (hasta 380px)
           =================================================== */
        @media (max-width: 380px) {
            h1 { font-size: 0.75rem; letter-spacing: 0; }
            .tab-btn { padding: 7px 7px; font-size: 0.58rem; }
            .header-actions { gap: 4px; }
            .custom-file-upload, 
            .header-actions button {
                font-size: 0.62rem;
                padding: 6px 7px;
            }
            .btn-tool { font-size: 0.6rem; padding: 6px 6px; }
            .empty-state { font-size: 0.9rem; padding: 25px 15px; }
            .empty-state span { font-size: 2rem; }
        }

        /* ===================================================
           LANDSCAPE EN MÓVIL
           =================================================== */
        @media (max-height: 500px) and (orientation: landscape) {
            header { padding: 4px 12px; flex-direction: row; }
            h1 { font-size: 0.8rem; }
            .custom-file-upload, 
            .header-actions button { 
                font-size: 0.65rem; 
                padding: 4px 8px; 
            }
            .tab-btn { padding: 6px 10px; font-size: 0.65rem; }
            .tab-content { padding: 6px 10px; gap: 6px; }
            .tool-group { flex: 1 1 60px; }
            .viewer { min-height: 200px; }
        }
    </style>
</head>
<body>

<header>
    <h1>🔬 CSI FORENSIC LAB PRO</h1>
    <div class="header-actions">
        <div id="status" style="font-size: 12px; font-family: monospace; color: var(--neon); margin-right: 10px;">⏳ Cargando...</div>
        <label for="upload" class="custom-file-upload">📁 Cargar</label>
        <input type="file" id="upload" accept="image/*">
        <button id="btn-clear" class="btn-danger">🗑️ Quitar</button>
        <button id="download" class="btn-primary">💾 Guardar</button>
    </div>
</header>

<nav class="toolbar">
    <div class="tab-nav">
        <button class="tab-btn active" data-tab="adjust">🎨 Ajustes</button>
        <button class="tab-btn" data-tab="forensic">🔍 Forenses</button>
        <button class="tab-btn" data-tab="inpaint">✨ Borrador</button>
        <button class="tab-btn" data-tab="ai">🧠 IA & OCR</button>
        <button class="tab-btn" data-tab="view">🔬 Visor</button>
    </div>

    <div class="tab-content active" id="tab-adjust">
        <div class="tool-group"><label>Brillo</label><input type="range" id="brightness" min="-100" max="100" value="0"></div>
        <div class="tool-group"><label>Contraste</label><input type="range" id="contrast" min="-100" max="100" value="0"></div>
        <div class="tool-group"><label>Saturación</label><input type="range" id="saturate" min="-100" max="100" value="0"></div>
        <div class="tool-group"><label>Grises</label><input type="range" id="grayscale" min="0" max="100" value="0"></div>
        <div class="tool-group"><label>Tono</label><input type="range" id="hueRotate" min="0" max="360" value="0"></div>
        <div class="tool-group"><label>Nitidez</label><input type="range" id="sharpness" min="0" max="100" value="0"></div>
        <button id="reset" class="btn-tool">Restablecer</button>
    </div>

    <div class="tab-content" id="tab-forensic">
        <button id="btn-thermal" class="btn-tool">🔥 Térmica</button>
        <button id="btn-night" class="btn-tool">🌙 Nocturna</button>
        <button id="btn-canny" class="btn-tool">📐 Canny Edge</button>
        <button id="btn-remove-bg" class="btn-tool btn-warning">✂️ Quitar Fondo</button>
    </div>

    <div class="tab-content" id="tab-inpaint">
        <p style="font-size: 0.8rem; color: #aaa;">Pinta sobre el objeto a eliminar y aplica el borrado.</p>
        <button id="btn-toggle-brush" class="btn-tool btn-warning">✏️ Activar Pincel</button>
        <div class="tool-group"><label>Tamaño Pincel</label><input type="range" id="brushSize" min="5" max="100" value="30"></div>
        <button id="btn-apply-inpaint" class="btn-tool btn-primary">✨ Aplicar Borrado</button>
        <button id="btn-clear-brush" class="btn-tool">🧹 Limpiar</button>
    </div>

    <div class="tab-content" id="tab-ai">
        <button id="btn-detect" class="btn-tool">🤖 Detección IA</button>
        <button id="btn-ocr" class="btn-tool">📝 Extraer Texto</button>
        <button id="btn-meta" class="btn-tool">📂 Metadata EXIF</button>
    </div>

    <div class="tab-content" id="tab-view">
        <button id="toggleLoupe" class="btn-tool btn-active">🔍 Lupa ON/OFF</button>
        <div class="tool-group"><label>Zoom Lupa</label><input type="range" id="lZoom" min="2" max="20" value="8"></div>
        <div class="tool-group"><label>Tamaño Lupa</label><input type="range" id="lSize" min="100" max="600" value="300"></div>
        <button id="btn-fit-screen" class="btn-tool">📐 Ajustar Pantalla</button>
        <button id="btn-zoom-100" class="btn-tool">🔲 100%</button>
        <button id="btn-zoom-reset" class="btn-tool">↩️ Reset Vista</button>
        <div class="tool-group">
            <label>Histograma</label>
            <canvas id="histogram" width="200" height="60" style="background: black; border-radius: 4px;"></canvas>
        </div>
    </div>
</nav>

<!-- Hint visible solo en móvil -->
<div class="touch-hint" id="touch-hint">Pestañas: desliza · Zoom: pellizca · Mover: 2 dedos</div>

<main class="viewer" id="viewer-area">
    <div class="empty-state" id="empty-state">
        <span>📁</span>
        Selecciona una imagen para comenzar el análisis
    </div>
    <div id="canvas-wrapper">
        <canvas id="canvas"></canvas>
        <canvas id="brush-canvas"></canvas>
        <canvas id="detections"></canvas>
        <canvas id="loupe"></canvas>
    </div>
    <div class="zoom-indicator" id="zoom-indicator" style="display:none;">100%</div>
</main>

<div id="ocr-modal" class="modal">
    <div class="modal-content">
        <span class="close-btn" id="close-ocr-modal">×</span>
        <h2>📝 Texto Extraído (OCR)</h2>
        <div id="ocr-result" class="modal-text">Procesando...</div>
    </div>
</div>

<div id="meta-modal" class="modal">
    <div class="modal-content">
        <span class="close-btn" id="close-meta-modal">×</span>
        <h2>📂 Metadata EXIF</h2>
        <pre id="meta" class="modal-text">Sin metadata...</pre>
    </div>
</div>

<script>
(function() {
    let model = null;
    let originalImage = null;
    let tempImageData = null;
    let cvReady = false;
    let loupeEnabled = true;

    let brushActive = false;
    let isDrawing = false;

    /* Detección de dispositivo táctil */
    const isTouchDevice = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);

    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d", { willReadFrequently: true });
    const dCanvas = document.getElementById("detections");
    const dctx = dCanvas.getContext("2d");
    const loupe = document.getElementById("loupe");
    const lctx = loupe.getContext("2d");
    const statusText = document.getElementById("status");
    const emptyState = document.getElementById("empty-state");
    const canvasWrapper = document.getElementById("canvas-wrapper");
    const viewerArea = document.getElementById("viewer-area");
    const zoomIndicator = document.getElementById("zoom-indicator");
    
    const ocrModal = document.getElementById("ocr-modal");
    const ocrResult = document.getElementById("ocr-result");
    const metaModal = document.getElementById("meta-modal");
    const metaPre = document.getElementById("meta");

    const brushCanvas = document.getElementById("brush-canvas");
    const bctx = brushCanvas.getContext("2d");
    const maskCanvas = document.createElement("canvas");
    const mctx = maskCanvas.getContext("2d");

    const controlIds = ["brightness", "contrast", "saturate", "grayscale", "hueRotate", "sharpness"];
    const inputs = {};
    controlIds.forEach(id => inputs[id] = document.getElementById(id));

    /* =============================================================
       SISTEMA DE ZOOM Y PANEAMIENTO
       ============================================================= */
    let zoomLevel = 1;
    let panX = 0;
    let panY = 0;
    let isPanning = false;
    let panStartX = 0;
    let panStartY = 0;

    const MIN_ZOOM = 0.05;
    const MAX_ZOOM = 30;

    /* Aplica la transformación CSS al contenedor del canvas */
    function updateViewerTransform() {
        canvasWrapper.style.transform = `translate(${panX}px, ${panY}px) scale(${zoomLevel})`;
        if (zoomIndicator) {
            zoomIndicator.textContent = `${Math.round(zoomLevel * 100)}%`;
        }
    }

    /* Reiniciar zoom y posición al centro */
    function resetView() {
        zoomLevel = 1;
        panX = 0;
        panY = 0;
        updateViewerTransform();
    }

    /* Ajustar la imagen completa al visor */
    function fitToScreen() {
        if (!originalImage) return;
        const rect = viewerArea.getBoundingClientRect();
        const padding = 20;
        const availW = rect.width - padding * 2;
        const availH = rect.height - padding * 2;
        
        /* Calcular el tamaño natural que tomaría el canvas sin zoom */
        const naturalW = canvas.width;
        const naturalH = canvas.height;
        const fitScale = Math.min(availW / naturalW, availH / naturalH, 1);
        
        zoomLevel = fitScale;
        panX = (rect.width - naturalW * zoomLevel) / 2;
        panY = (rect.height - naturalH * zoomLevel) / 2;
        updateViewerTransform();
    }

    /* --- ZOOM CON CTRL + RUEDA (Desktop) --- */
    viewerArea.addEventListener('wheel', (e) => {
        if (!e.ctrlKey && !e.metaKey) return;
        e.preventDefault();

        if (!originalImage) return;

        const rect = viewerArea.getBoundingClientRect();
        const mouseX = e.clientX - rect.left;
        const mouseY = e.clientY - rect.top;

        /* Coordenadas del punto bajo el cursor ANTES del zoom */
        const beforeX = (mouseX - panX) / zoomLevel;
        const beforeY = (mouseY - panY) / zoomLevel;

        /* Calcular nuevo nivel de zoom */
        const factor = e.deltaY > 0 ? 0.9 : 1.1;
        zoomLevel = Math.max(MIN_ZOOM, Math.min(MAX_ZOOM, zoomLevel * factor));

        /* Coordenadas del mismo punto DESPUÉS del zoom */
        const afterX = (mouseX - panX) / zoomLevel;
        const afterY = (mouseY - panY) / zoomLevel;

        /* Ajustar paneo para que el punto bajo el cursor no se mueva */
        panX += (afterX - beforeX) * zoomLevel;
        panY += (afterY - beforeY) * zoomLevel;

        updateViewerTransform();
    }, { passive: false });

    /* --- PANEAMIENTO CON RATÓN (Botón central o Ctrl+Click) --- */
    viewerArea.addEventListener('mousedown', (e) => {
        /* Solo paneo si: botón central, o Ctrl+clic izquierdo sin pincel activo */
        if (e.button === 1 || (e.button === 0 && (e.ctrlKey || e.metaKey) && !brushActive)) {
            isPanning = true;
            panStartX = e.clientX - panX;
            panStartY = e.clientY - panY;
            viewerArea.style.cursor = 'grabbing';
            e.preventDefault();
        }
    });

    window.addEventListener('mousemove', (e) => {
        if (!isPanning) return;
        panX = e.clientX - panStartX;
        panY = e.clientY - panStartY;
        updateViewerTransform();
    });

    window.addEventListener('mouseup', (e) => {
        if (isPanning) {
            isPanning = false;
            viewerArea.style.cursor = '';
        }
    });

    /* --- PINCH-TO-ZOOM Y PANEAMIENTO CON 2 DEDOS (Móvil) --- */
    let pinchStartDist = 0;
    let pinchStartZoom = 1;
    let pinchStartPanX = 0;
    let pinchStartPanY = 0;
    let pinchStartCenterX = 0;
    let pinchStartCenterY = 0;
    let isTwoFingerTouch = false;

    viewerArea.addEventListener('touchstart', (e) => {
        if (e.touches.length === 2 && originalImage) {
            isTwoFingerTouch = true;
            e.preventDefault();

            const dx = e.touches[0].clientX - e.touches[1].clientX;
            const dy = e.touches[0].clientY - e.touches[1].clientY;
            pinchStartDist = Math.max(1, Math.sqrt(dx * dx + dy * dy));
            pinchStartZoom = zoomLevel;
            pinchStartPanX = panX;
            pinchStartPanY = panY;
            pinchStartCenterX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
            pinchStartCenterY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
        }
    }, { passive: false });

    viewerArea.addEventListener('touchmove', (e) => {
        if (!isTwoFingerTouch || e.touches.length < 2) return;
        e.preventDefault();

        const dx = e.touches[0].clientX - e.touches[1].clientX;
        const dy = e.touches[0].clientY - e.touches[1].clientY;
        const dist = Math.max(1, Math.sqrt(dx * dx + dy * dy));
        const scale = dist / pinchStartDist;

        /* Centro actual de los dos dedos */
        const rect = viewerArea.getBoundingClientRect();
        const cx = (e.touches[0].clientX + e.touches[1].clientX) / 2 - rect.left;
        const cy = (e.touches[0].clientY + e.touches[1].clientY) / 2 - rect.top;

        /* Movimiento de paneo (arrastrar con 2 dedos) */
        const dragX = (e.touches[0].clientX + e.touches[1].clientX) / 2 - pinchStartCenterX;
        const dragY = (e.touches[0].clientY + e.touches[1].clientY) / 2 - pinchStartCenterY;

        /* Nuevo zoom */
        const newZoom = Math.max(MIN_ZOOM, Math.min(MAX_ZOOM, pinchStartZoom * scale));

        /* Zoom hacia el centro del pinch */
        const beforeX = (cx - pinchStartPanX) / pinchStartZoom;
        const beforeY = (cy - pinchStartPanY) / pinchStartZoom;

        zoomLevel = newZoom;
        panX = cx - beforeX * zoomLevel + dragX;
        panY = cy - beforeY * zoomLevel + dragY;

        updateViewerTransform();
    }, { passive: false });

    viewerArea.addEventListener('touchend', (e) => {
        if (e.touches.length < 2) {
            isTwoFingerTouch = false;
        }
    });

    viewerArea.addEventListener('touchcancel', () => {
        isTwoFingerTouch = false;
    });

    /* Botones del panel Visor */
    document.getElementById("btn-fit-screen").addEventListener("click", fitToScreen);
    document.getElementById("btn-zoom-100").addEventListener("click", () => {
        if (!originalImage) return;
        /* Centrar la imagen al 100% */
        const rect = viewerArea.getBoundingClientRect();
        zoomLevel = 1;
        panX = (rect.width - canvas.width) / 2;
        panY = (rect.height - canvas.height) / 2;
        updateViewerTransform();
    });
    document.getElementById("btn-zoom-reset").addEventListener("click", resetView);

    /* =============================================================
       FIN SISTEMA DE ZOOM
       ============================================================= */

    /* Si es táctil, desactivar lupa por defecto */
    if (isTouchDevice) {
        loupeEnabled = false;
        const loupeBtn = document.getElementById("toggleLoupe");
        if (loupeBtn) loupeBtn.classList.remove("btn-active");
    }

    /* ===== PESTAÑAS ===== */
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
        });
    });

    document.getElementById("close-ocr-modal").addEventListener("click", () => ocrModal.style.display = "none");
    document.getElementById("close-meta-modal").addEventListener("click", () => metaModal.style.display = "none");

    /* Cerrar modales al tocar fuera */
    [ocrModal, metaModal].forEach(modal => {
        modal.addEventListener('click', (e) => {
            if (e.target === modal) modal.style.display = 'none';
        });
    });

    /* ===== CARGA DE OpenCV e IA ===== */
    function updateSystemStatus() {
        if (cvReady && model) statusText.textContent = "✅ IA y OpenCV Online";
        else if (cvReady) statusText.textContent = "✅ OpenCV | ⏳ IA...";
        else if (model) statusText.textContent = "✅ IA | ⏳ OpenCV...";
    }

    function onOpenCvReady() {
        cvReady = true;
        updateSystemStatus();
    }

    async function initAI() {
        try {
            model = await cocoSsd.load();
            updateSystemStatus();
        } catch (e) { 
            console.error("Error IA:", e);
            statusText.textContent = "❌ Error IA"; 
        }
    }

    if (typeof cv !== 'undefined') {
        if (cv instanceof Promise) cv.then(onOpenCvReady);
        else cv['onRuntimeInitialized'] = onOpenCvReady;
    } else {
        window.Module = { onRuntimeInitialized: onOpenCvReady };
    }
    initAI();

    /* ===== CARGA DE IMAGEN ===== */
    document.getElementById("upload").addEventListener("change", (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const img = new Image();
        img.onload = () => {
            originalImage = img;
            canvas.width = dCanvas.width = brushCanvas.width = maskCanvas.width = img.width;
            canvas.height = dCanvas.height = brushCanvas.height = maskCanvas.height = img.height;
            emptyState.style.display = 'none';
            canvasWrapper.style.display = 'inline-block';
            zoomIndicator.style.display = 'block';
            
            /* Resetear vista y ajustar al cargar */
            resetView();
            fitToScreen();
            
            applyFilters();
        };
        img.src = URL.createObjectURL(file);
    });

    /* Quitar Imagen */
    document.getElementById("btn-clear").addEventListener("click", () => {
        originalImage = null;
        tempImageData = null;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        bctx.clearRect(0, 0, brushCanvas.width, brushCanvas.height);
        dctx.clearRect(0, 0, dCanvas.width, dCanvas.height);
        document.getElementById("upload").value = "";
        canvasWrapper.style.display = 'none';
        zoomIndicator.style.display = 'none';
        emptyState.style.display = 'block';
        controlIds.forEach(id => inputs[id].value = 0);
        const hCanvas = document.getElementById("histogram");
        hCanvas.getContext("2d").clearRect(0, 0, hCanvas.width, hCanvas.height);
        resetView();
        statusText.textContent = "🗑️ Imagen borrada. Listo.";
    });

    /* ===== FILTROS ===== */
    function applyFilters() {
        if (!originalImage) return;
        ctx.filter = `
            brightness(${100 + parseInt(inputs.brightness.value)}%)
            contrast(${100 + parseInt(inputs.contrast.value)}%)
            saturate(${100 + parseInt(inputs.saturate.value)}%)
            grayscale(${inputs.grayscale.value}%)
            hue-rotate(${inputs.hueRotate.value}deg)
        `;
        ctx.drawImage(originalImage, 0, 0);
        ctx.filter = "none";

        let imageData = ctx.getImageData(0,0, canvas.width, canvas.height);
        if (parseInt(inputs.sharpness.value) > 0) {
            sharpen(imageData, parseInt(inputs.sharpness.value));
            ctx.putImageData(imageData, 0, 0);
        }

        tempImageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        drawHistogram();
        dctx.clearRect(0, 0, dCanvas.width, dCanvas.height);
    }

    function sharpen(imageData, amount) {
        const d = imageData.data;
        const factor = amount / 20;
        for (let i = 0; i < d.length; i += 4) {
            d[i] = d[i] + factor * (d[i] - 128);
            d[i+1] = d[i+1] + factor * (d[i+1] - 128);
            d[i+2] = d[i+2] + factor * (d[i+2] - 128);
        }
    }

    /* ===== FILTROS FORENSES ===== */
    document.getElementById("btn-thermal").addEventListener("click", () => {
        if (!tempImageData) return;
        let d = new Uint8ClampedArray(tempImageData.data);
        for (let i = 0; i < d.length; i += 4) {
            let avg = (d[i] + d[i+1] + d[i+2]) / 3;
            d[i] = avg > 128 ? 255 : avg * 2;
            d[i+1] = avg;
            d[i+2] = 255 - avg;
        }
        ctx.putImageData(new ImageData(d, canvas.width, canvas.height), 0, 0);
        tempImageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    });

    document.getElementById("btn-night").addEventListener("click", () => {
        if (!tempImageData) return;
        let d = new Uint8ClampedArray(tempImageData.data);
        for (let i = 0; i < d.length; i += 4) {
            let g = d[i] * 0.3 + d[i+1] * 0.59 + d[i+2] * 0.11;
            d[i] = 0; d[i+1] = g * 1.5; d[i+2] = 0;
        }
        ctx.putImageData(new ImageData(d, canvas.width, canvas.height), 0, 0);
        tempImageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    });

    document.getElementById("btn-canny").addEventListener("click", () => {
        if (!cvReady) return alert("OpenCV cargando...");
        try {
            let src = cv.imread(canvas);
            let dst = new cv.Mat();
            cv.cvtColor(src, src, cv.COLOR_RGBA2GRAY);
            cv.Canny(src, dst, 50, 150);
            cv.imshow(canvas, dst);
            src.delete(); dst.delete();
            tempImageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        } catch (e) { console.error(e); }
    });

    /* ==================================================================
       QUITAR FONDO PRECISO (GrabCut Avanzado + Morfología + Feathering)
       ================================================================== */
    document.getElementById("btn-remove-bg").addEventListener("click", () => {
        if (!cvReady) return alert("OpenCV está cargando, espera un momento...");
        if (!originalImage) return alert("Primero carga una imagen.");
        
        statusText.textContent = "⏳ Generando máscara precisa de fondo...";
        
        setTimeout(() => {
            try {
                let src = cv.imread(canvas);
                let srcRGB = new cv.Mat();
                cv.cvtColor(src, srcRGB, cv.COLOR_RGBA2RGB, 0);
                
                let mask = new cv.Mat();
                let bgdModel = new cv.Mat();
                let fgdModel = new cv.Mat();
                
                let marginX = Math.max(2, Math.floor(src.cols * 0.02));
                let marginY = Math.max(2, Math.floor(src.rows * 0.02));
                let rect1 = new cv.Rect(marginX, marginY, src.cols - 2 * marginX, src.rows - 2 * marginY);
                
                cv.grabCut(srcRGB, mask, rect1, bgdModel, fgdModel, 3, cv.GC_INIT_WITH_RECT);
                
                let tempBinMask1 = new cv.Mat();
                tempBinMask1.create(mask.rows, mask.cols, cv.CV_8UC1);
                let tempMaskData1 = tempBinMask1.data;
                for (let i = 0; i < tempMaskData1.length; i++) {
                    tempMaskData1[i] = (mask.data[i] === 1 || mask.data[i] === 3) ? 255 : 0;
                }
                
                let kernel = cv.getStructuringElement(cv.MORPH_ELLIPSE, new cv.Size(5, 5));
                let dilatedMask = new cv.Mat();
                cv.dilate(tempBinMask1, dilatedMask, kernel);
                
                let refinedMask = new cv.Mat();
                refinedMask.create(mask.rows, mask.cols, cv.CV_8UC1);
                let refinedData = refinedMask.data;
                for (let i = 0; i < refinedData.length; i++) {
                    if (dilatedMask.data[i] === 0) {
                        refinedData[i] = cv.GC_BGD;
                    } else {
                        refinedData[i] = mask.data[i];
                    }
                }
                
                let bgdModel2 = new cv.Mat();
                let fgdModel2 = new cv.Mat();
                cv.grabCut(srcRGB, refinedMask, new cv.Rect(), bgdModel2, fgdModel2, 5, cv.GC_INIT_WITH_MASK);
                
                let finalBinMask = new cv.Mat();
                finalBinMask.create(refinedMask.rows, refinedMask.cols, cv.CV_8UC1);
                let finalData = finalBinMask.data;
                for (let i = 0; i < finalData.length; i++) {
                    finalData[i] = (refinedMask.data[i] === 1 || refinedMask.data[i] === 3) ? 255 : 0;
                }
                
                let closedMask = new cv.Mat();
                let kernelClose = cv.getStructuringElement(cv.MORPH_ELLIPSE, new cv.Size(7, 7));
                cv.morphologyEx(finalBinMask, closedMask, cv.MORPH_CLOSE, kernelClose);
                
                let openedMask = new cv.Mat();
                let kernelOpen = cv.getStructuringElement(cv.MORPH_ELLIPSE, new cv.Size(5, 5));
                cv.morphologyEx(closedMask, openedMask, cv.MORPH_OPEN, kernelOpen);
                
                let featheredMask = new cv.Mat();
                let featherRadius = Math.max(1, Math.floor(Math.min(src.cols, src.rows) * 0.005));
                cv.GaussianBlur(openedMask, featheredMask, new cv.Size(0, 0), featherRadius);
                
                let alphaMask = new cv.Mat();
                alphaMask.create(featheredMask.rows, featheredMask.cols, cv.CV_8UC1);
                let alphaData = alphaMask.data;
                for (let i = 0; i < alphaData.length; i++) {
                    alphaData[i] = Math.min(255, Math.max(0, featheredMask.data[i] * 2));
                }
                
                let dst = new cv.Mat(src.rows, src.cols, cv.CV_8UC4);
                let srcPlanes = new cv.MatVector();
                cv.split(src, srcPlanes);
                let dstPlanes = new cv.MatVector();
                dstPlanes.push_back(srcPlanes.get(0));
                dstPlanes.push_back(srcPlanes.get(1));
                dstPlanes.push_back(srcPlanes.get(2));
                dstPlanes.push_back(alphaMask);
                cv.merge(dstPlanes, dst);
                
                cv.imshow(canvas, dst);
                tempImageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                drawHistogram();
                statusText.textContent = "✅ Fondo eliminado con precisión";
                
                src.delete(); srcRGB.delete(); mask.delete(); bgdModel.delete(); fgdModel.delete();
                tempBinMask1.delete(); dilatedMask.delete(); refinedMask.delete();
                bgdModel2.delete(); fgdModel2.delete();
                finalBinMask.delete(); closedMask.delete(); openedMask.delete();
                featheredMask.delete(); alphaMask.delete();
                dst.delete(); srcPlanes.delete(); dstPlanes.delete();
                kernel.delete(); kernelClose.delete(); kernelOpen.delete();
                
            } catch (e) {
                console.error("Error en GrabCut Avanzado:", e);
                statusText.textContent = "❌ Error al procesar fondo";
            }
        }, 100);
    });

    /* ===== BORRADOR MÁGICO ===== */
    document.getElementById("btn-toggle-brush").addEventListener("click", (e) => {
        brushActive = !brushActive;
        if (brushActive) {
            e.target.classList.add("btn-active");
            e.target.textContent = "🚫 Desactivar";
            canvas.style.cursor = "crosshair";
            canvas.style.touchAction = 'none';
            if (loupeEnabled) document.getElementById("toggleLoupe").click();
        } else {
            e.target.classList.remove("btn-active");
            e.target.textContent = "✏️ Activar Pincel";
            canvas.style.cursor = "default";
            canvas.style.touchAction = 'auto';
        }
    });

    document.getElementById("btn-clear-brush").addEventListener("click", () => {
        bctx.clearRect(0, 0, brushCanvas.width, brushCanvas.height);
        mctx.clearRect(0, 0, maskCanvas.width, maskCanvas.height);
    });

    /* Conversión de coordenadas: funciona correctamente con zoom porque
       getBoundingClientRect() devuelve las dimensiones reales renderizadas */
    function getCanvasPos(clientX, clientY) {
        const rect = canvas.getBoundingClientRect();
        return {
            x: (clientX - rect.left) * (canvas.width / rect.width),
            y: (clientY - rect.top) * (canvas.height / rect.height)
        };
    }

    function paintBrush(pos) {
        const size = parseInt(document.getElementById("brushSize").value);
        const halfSize = size / 2;

        bctx.fillStyle = "rgba(255, 0, 0, 0.5)";
        bctx.beginPath();
        bctx.arc(pos.x, pos.y, halfSize, 0, Math.PI * 2);
        bctx.fill();

        mctx.fillStyle = "white";
        mctx.beginPath();
        mctx.arc(pos.x, pos.y, halfSize, 0, Math.PI * 2);
        mctx.fill();
    }

    /* --- Eventos de RATÓN para pincel --- */
    canvas.addEventListener("mousedown", (e) => {
        if (!brushActive || isPanning) return;
        isDrawing = true;
        paintBrush(getCanvasPos(e.clientX, e.clientY));
    });
    canvas.addEventListener("mousemove", (e) => {
        if (!brushActive || !isDrawing || isPanning) return;
        paintBrush(getCanvasPos(e.clientX, e.clientY));
    });
    canvas.addEventListener("mouseup", () => isDrawing = false);
    canvas.addEventListener("mouseleave", () => isDrawing = false);

    /* --- Eventos TÁCTILES para pincel (solo 1 dedo, sin pinch) --- */
    canvas.addEventListener("touchstart", (e) => {
        if (!brushActive || e.touches.length > 1 || isTwoFingerTouch) return;
        e.preventDefault();
        isDrawing = true;
        const t = e.touches[0];
        paintBrush(getCanvasPos(t.clientX, t.clientY));
    }, { passive: false });

    canvas.addEventListener("touchmove", (e) => {
        if (!brushActive || !isDrawing || e.touches.length > 1 || isTwoFingerTouch) return;
        e.preventDefault();
        const t = e.touches[0];
        paintBrush(getCanvasPos(t.clientX, t.clientY));
    }, { passive: false });

    canvas.addEventListener("touchend", (e) => {
        if (e.touches.length === 0) isDrawing = false;
    });
    canvas.addEventListener("touchcancel", () => isDrawing = false);

    /* Aplicar Inpaint */
    document.getElementById("btn-apply-inpaint").addEventListener("click", () => {
        if (!cvReady) return alert("OpenCV cargando...");
        if (!originalImage) return;
        statusText.textContent = "⏳ Eliminando selección...";
        setTimeout(() => {
            try {
                let src = cv.imread(canvas);
                let srcRGB = new cv.Mat();
                cv.cvtColor(src, srcRGB, cv.COLOR_RGBA2RGB);

                let mask = cv.imread(maskCanvas);
                let maskGray = new cv.Mat();
                cv.cvtColor(mask, maskGray, cv.COLOR_RGBA2GRAY);
                let binaryMask = new cv.Mat();
                cv.threshold(maskGray, binaryMask, 10, 255, cv.THRESH_BINARY);

                let dst = new cv.Mat();
                cv.inpaint(srcRGB, binaryMask, dst, 3, cv.INPAINT_TELEA);

                let dstRGBA = new cv.Mat();
                cv.cvtColor(dst, dstRGBA, cv.COLOR_RGB2RGBA);

                let rgbaPlanes = new cv.MatVector();
                cv.split(src, rgbaPlanes);
                let alpha = rgbaPlanes.get(3);
                let dstPlanes = new cv.MatVector();
                cv.split(dstRGBA, dstPlanes);
                dstPlanes.set(3, alpha);
                let finalDst = new cv.Mat();
                cv.merge(dstPlanes, finalDst);

                cv.imshow(canvas, finalDst);
                tempImageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                bctx.clearRect(0, 0, brushCanvas.width, brushCanvas.height);
                mctx.clearRect(0, 0, maskCanvas.width, maskCanvas.height);
                drawHistogram();
                statusText.textContent = "✅ Objeto eliminado";

                src.delete(); srcRGB.delete(); mask.delete(); maskGray.delete(); 
                binaryMask.delete(); dst.delete(); dstRGBA.delete(); 
                rgbaPlanes.delete(); dstPlanes.delete(); finalDst.delete();
            } catch (err) {
                console.error(err);
                statusText.textContent = "❌ Error Inpaint";
            }
        }, 100);
    });

    /* ===== LUPA (solo ratón, sin zoom activo) ===== */
    function handleLoupe(e) => {
        if (!loupeEnabled || !originalImage || brushActive || isTouchDevice || zoomLevel !== 1) return;
        const rect = canvas.getBoundingClientRect();
        const x = (e.clientX - rect.left) * (canvas.width / rect.width);
        const y = (e.clientY - rect.top) * (canvas.height / rect.height);

        const lSize = parseInt(document.getElementById("lSize").value);
        const lZoom = parseInt(document.getElementById("lZoom").value);

        loupe.width = loupe.height = lSize;
        loupe.style.width = loupe.style.height = lSize + "px";
        loupe.style.display = "block";
        loupe.style.left = (e.clientX - rect.left - lSize / 2) + "px";
        loupe.style.top = (e.clientY - rect.top - lSize / 2) + "px";

        const viewArea = lSize / lZoom;
        lctx.clearRect(0, 0, lSize, lSize);
        lctx.save();
        lctx.beginPath();
        lctx.arc(lSize/2, lSize/2, lSize/2, 0, Math.PI*2);
        lctx.clip();
        lctx.drawImage(canvas, x - viewArea/2, y - viewArea/2, viewArea, viewArea, 0, 0, lSize, lSize);
        lctx.restore();
    }

    canvas.addEventListener("mousemove", handleLoupe);
    canvas.addEventListener("mouseleave", () => loupe.style.display = "none");

    document.getElementById("toggleLoupe").addEventListener("click", (e) => {
        loupeEnabled = !loupeEnabled;
        e.target.classList.toggle("btn-active");
        if(!loupeEnabled) loupe.style.display = "none";
    });

    /* ===== IA & OCR ===== */
    document.getElementById("btn-detect").addEventListener("click", async () => {
        if (!model) return alert("El modelo de IA aún se está cargando.");
        if (!originalImage) return;
        
        statusText.textContent = "⏳ Analizando con IA...";
        try {
            const predictions = await model.detect(canvas);
            dctx.clearRect(0, 0, dCanvas.width, dCanvas.height);
            
            if (predictions.length === 0) {
                statusText.textContent = "✅ No se detectaron objetos.";
                return;
            }

            const displayScale = canvas.getBoundingClientRect().width / canvas.width;
            const lineWidth = Math.max(2, Math.round(4 * displayScale));
            const fontSize = Math.max(12, Math.round(20 * displayScale));

            predictions.forEach(p => {
                dctx.strokeStyle = "#00ff99";
                dctx.lineWidth = lineWidth;
                dctx.strokeRect(...p.bbox);
                dctx.fillStyle = "#00ff99";
                dctx.font = `bold ${fontSize}px Arial`;
                const text = `${p.class.toUpperCase()} ${Math.round(p.score*100)}%`;
                const textY = p.bbox[1] > fontSize + 5 ? p.bbox[1] - 5 : fontSize + 5;
                dctx.fillText(text, p.bbox[0], textY);
            });
            statusText.textContent = `✅ ${predictions.length} objetos detectados`;
        } catch (error) {
            console.error("Error IA:", error);
            statusText.textContent = "❌ Error en IA";
        }
    });

    /* OCR */
    document.getElementById("btn-ocr").addEventListener("click", async () => {
        if (!originalImage) return;
        statusText.textContent = "⏳ Procesando OCR...";
        ocrModal.style.display = "block";
        ocrResult.textContent = "Iniciando motor de reconocimiento...";
        
        const tempCanvas = document.createElement('canvas');
        tempCanvas.width = canvas.width;
        tempCanvas.height = canvas.height;
        const tempCtx = tempCanvas.getContext('2d');
        tempCtx.fillStyle = "white";
        tempCtx.fillRect(0, 0, tempCanvas.width, tempCanvas.height);
        tempCtx.drawImage(canvas, 0, 0);

        try {
            const result = await Tesseract.recognize(tempCanvas, 'spa+eng', {
                logger: m => {
                    if (m.status === 'recognizing text') {
                        const pct = Math.round(m.progress * 100);
                        ocrResult.textContent = `Reconociendo texto... ${pct}%`;
                        statusText.textContent = `⏳ OCR: ${pct}%`;
                    }
                }
            });
            ocrResult.textContent = result.data.text || "No se detectó texto.";
            statusText.textContent = "✅ OCR Finalizado";
        } catch (e) {
            console.error("Error OCR:", e);
            ocrResult.textContent = "Error durante el OCR.";
            statusText.textContent = "❌ Error OCR";
        }
    });

    /* Metadata EXIF */
    document.getElementById("btn-meta").addEventListener("click", () => {
        const file = document.getElementById("upload").files[0];
        if (!file) return;
        
        metaModal.style.display = "block";
        metaPre.textContent = "Leyendo metadata...";

        EXIF.getData(file, function() {
            const data = EXIF.getAllTags(file);
            metaPre.textContent = Object.keys(data).length ? JSON.stringify(data, null, 2) : "No contiene metadata EXIF.";
        });
    });

    /* ===== HISTOGRAMA ===== */
    function drawHistogram() {
        const hCanvas = document.getElementById("histogram");
        const hctx = hCanvas.getContext("2d");
        if (!tempImageData) return;
        const data = tempImageData.data;
        let hist = new Array(256).fill(0);
        for (let i = 0; i < data.length; i += 4) {
            hist[Math.floor((data[i] + data[i+1] + data[i+2]) / 3)]++;
        }
        hctx.clearRect(0, 0, hCanvas.width, hCanvas.height);
        let max = Math.max(...hist);
        hctx.fillStyle = "#00ff99";
        const barW = hCanvas.width / 256;
        hist.forEach((v, i) => {
            let h = (v / max) * hCanvas.height;
            hctx.fillRect(i * barW, hCanvas.height - h, Math.max(1, barW), h);
        });
    }

    /* ===== LISTENERS GLOBALES ===== */
    controlIds.forEach(id => inputs[id].addEventListener("input", applyFilters));

    document.getElementById("reset").addEventListener("click", () => {
        controlIds.forEach(id => inputs[id].value = 0);
        applyFilters();
    });

    document.getElementById("download").addEventListener("click", () => {
        if (!originalImage) return;
        const link = document.createElement('a');
        link.download = 'Evidencia_Forense.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
    });

})();
</script>
